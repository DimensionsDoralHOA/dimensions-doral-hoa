.login-btn{width:100%;padding:10px;background:#1e3a5f;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}

.login-err{background:#fed7d7;color:#c53030;padding:7px 10px;border-radius:6px;font-size:12px;margin-bottom:10px;display:none}

.role-tag{padding:2px 8px;border-radius:9px;font-size:10px;font-weight:700;margin-left:6px;background:#bee3f8;color:#2c5282}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:230px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}

.sidebar-search input{width:100%;padding:7px 10px;border:1px solid #cbd5e0;border-radius:6px;font-size:13px;outline:none}
.prop-list{flex:1;overflow-y:auto}
.prop-item{padding:7px 10px;border-bottom:1px solid #f1f5f9;cursor:pointer;display:flex;align-items:center;gap:7px}
.prop-item:hover{background:#f7fafc}
.prop-item.active{background:#ebf4ff}
.prop-num{background:#1e3a5f;color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700;min-width:44px;text-align:center;white-space:nowrap}
.prop-info{overflow:hidden}
.prop-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prop-sub{font-size:11px;color:#718096;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.modal{background:#fff;border-radius:10px;width:100%;max-width:640px}

.modal-hdr h2{font-size:15px;font-weight:600}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:15px;line-height:1}
.modal-body{padding:14px;max-height:75vh;overflow-y:auto}
.sec{margin-bottom:12px;border:1px solid #e2e8f0;border-radius:7px;overflow:hidden}
.sec-title{background:#f7fafc;padding:6px 11px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#4a5568;border-bottom:1px solid #e2e8f0}
.sec-body{padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sec-body.cols1{grid-template-columns:1fr}
.sec-body.cols4{grid-template-columns:repeat(4,1fr)}
.field label{display:block;font-size:10px;color:#718096;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.field .vv{font-size:13px;color:#2d3748;min-height:18px}
.field .vv.empty{color:#a0aec0;font-style:italic;font-size:12px}
.field input,.field select,.field textarea{width:100%;padding:6px 8px;border:1px solid #cbd5e0;border-radius:5px;font-size:13px;outline:none;display:none;background:#fff;color:#1a202c}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#3182ce}
.editing .field input,.editing .field select,.editing .field textarea{display:block}
.editing .field .vv{display:none}
.modal-footer{padding:10px 14px;border-top:1px solid #e2e8f0;display:flex;gap:8px;justify-content:flex-end;background:#fff;border-radius:0 0 10px 10px}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500}
.btn-primary{background:#1e3a5f;color:#fff}
.btn-success{background:#276749;color:#fff}
.btn-secondary{background:#edf2f7;color:#4a5568}
.list-wrap{flex:1;overflow-y:auto;padding:8px}
table.tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);table-layout:fixed}
.tbl th{background:#1e3a5f;color:#fff;padding:9px 10px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.tbl td{padding:8px 10px;border-bottom:1px solid #f1f5f9;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.tbl tr:hover td{background:#f7fafc}
.badge{display:inline-block;padding:2px 7px;border-radius:9px;font-size:11px;font-weight:600}
.badge-blue{background:#bee3f8;color:#2c5282}
.badge-green{background:#c6f6d5;color:#276749}
.search-wrap{flex:1;overflow-y:auto;padding:12px}
.search-wrap>input{width:100%;max-width:500px;padding:10px 14px;border:1px solid #cbd5e0;border-radius:8px;font-size:15px;outline:none;margin-bottom:12px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px;cursor:pointer}
.card:hover{border-color:#90cdf4}
.ie-wrap{flex:1;overflow-y:auto;padding:14px}
.ie-card{background:#fff;border-radius:8px;padding:14px;margin-bottom:10px;border:1px solid #e2e8f0}
.ie-card h3{font-size:14px;font-weight:600;margin-bottom:8px;color:#2d3748}
.ie-card p{font-size:12px;color:#718096;margin-bottom:10px;line-height:1.5}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:#f7fafc;border-radius:7px;padding:10px;text-align:center}
.stat-n{font-size:22px;font-weight:700;color:#1e3a5f}

.toast{position:fixed;bottom:16px;right:16px;background:#276749;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:999;transition:opacity .3s}
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:#718096;gap:8px;font-size:14px}
@media(max-width:600px){.sidebar{display:none}.topbar h1{font-size:13px}.nav-btn{font-size:11px;padding:4px 6px}.sec-body.cols4{grid-template-columns:repeat(2,1fr)}}

</head>

let bx=488;["th11572","th11566","th11565","th11548","th11542","th11536","th11530"].forEach((id,i)=>{s+=u(id,bx+i*36,363,34,82,true);});bx+=7*36+10;["th11524","th11518","th11512","th11506","th11500","th11494"].forEach((id,i)=>{s+=u(id,bx+i*36,363,34,82,true);});bx+=6*36+10;["th11498","th11492","th11486","th11480","th11474","th11468"].forEach((id,i)=>{s+=u(id,bx+i*36,363,34,82,true);});bx+=6*36+10;["th11462","th11456","th11450","th11444","th11438","th11432","th11426"].forEach((id,i)=>{s+=u(id,bx+i*36,363,34,82,true);});
const RL=1218,RR=1338,RW=107,RH=38,RG=4;["4878","4872b","4866","4860","4854"].forEach((id,i)=>{s+=u(id,RL,68+i*(RH+RG),RW,RH);});["4877","4871b","4865","4859"].forEach((id,i)=>{s+=u(id,RR,68+i*(RH+RG),RW,RH);});

s+=`</svg><div style="display:flex;gap:16px;padding:5px;font-size:12px;align-items:center"><span><span style="display:inline-block;width:14px;height:14px;background:#b7e4c7;border:1px solid #333;vertical-align:middle"></span> Con datos</span><span><span style="display:inline-block;width:14px;height:14px;background:#fce4e4;border:1px solid #333;vertical-align:middle"></span> Sin datos</span><span><span style="display:inline-block;width:14px;height:14px;background:#90cdf4;border:2px solid #2b6cb0;vertical-align:middle"></span> Seleccionado</span></div>`;

function renderList(){document.getElementById("list-body").innerHTML=filteredProps(document.getElementById("sb-search").value).map(p=>`<tr onclick="selectProp('${p.id}');switchView('map')"><td><span class="badge badge-blue">${p.unit}</span></td><td>${p.homeowner1||"—"}</td><td>${p.homeowner2||"—"}</td><td>${p.tenant1_name||"—"}</td><td>${[1,2,3,4,5,6,7,8].filter(n=>p["kf"+n]).map(n=>`<span class="badge badge-green">${p["kf"+n]}</span>`).join(" ")}</td><td>${p.pet1_name?"🐶 "+p.pet1_name:""}</td></tr>`).join("");}
function renderSearch(){const q=(document.getElementById("main-search")||{value:""}).value;const el=document.getElementById("search-grid");if(!el)return;el.innerHTML=filteredProps(q).map(p=>`<div class="card" onclick="selectProp('${p.id}');switchView('map')"><div style="display:flex;gap:6px;margin-bottom:5px;align-items:center"><span class="badge badge-blue">${p.unit}</span>${hasData(p)?"<span class='badge badge-green'>✓</span>":""}</div><div style="font-size:13px;font-weight:500">${p.homeowner1||"<span style='color:#a0aec0;font-size:12px'>Sin datos</span>"}</div>${p.tenant1_name?`<div style="font-size:12px;color:#718096">T: ${p.tenant1_name}</div>`:""}</div>`).join("");}
function renderIE(){const t=Object.keys(DB).length,d=Object.values(DB).filter(hasData).length;const ro=currentRole==="viewer";document.getElementById("ie-content").innerHTML=ro?"<p style='color:#718096;padding:16px'>Necesitas acceso admin.</p>":`<div class="ie-card"><h3>📤 Exportar a CSV</h3><p>Descarga todos los datos.</p><button class="btn btn-primary" onclick="exportCSV()">Descargar CSV</button></div><div class="ie-card"><h3>📥 Importar desde CSV</h3><p>Columnas: id, unit, homeowner1, homeowner2, tenant1_name, tenant1_phone, tenant1_email, tenant2_name, tenant2_phone, tenant2_email, occ1_name, occ1_phone, occ1_email, occ2_name, occ2_phone, occ2_email, kf1...kf8, pet1_name, pet1_breed, pet1_gender, pet2_name, pet2_breed, pet2_gender, notes</p><input type="file" accept=".csv" onchange="importCSV(event)"/></div><div class="ie-card"><h3>📊 Estadísticas</h3><div class="stat-grid"><div class="stat"><div class="stat-n">${t}</div><div class="stat-l">Total</div></div><div class="stat"><div class="stat-n">${d}</div><div class="stat-l">Con datos</div></div><div class="stat"><div class="stat-n">${t-d}</div><div class="stat-l">Sin datos</div></div></div></div>`;}
function switchView(v){currentView=v;["map","list","search","ie"].forEach(n=>document.getElementById("view-"+n).style.display=n===v?"flex":"none");document.querySelectorAll(".nav-btn").forEach((b,i)=>b.classList.toggle("active",["map","list","search","ie"][i]===v));if(v==="search")setTimeout(()=>document.getElementById("main-search").focus(),50);}
function selectProp(id){selectedId=id;renderSidebar();renderMap();openModal(id);}
function overlayClick(e){if(e.target===document.getElementById("overlay"))closeModal();}
function openModal(id){const p=DB[id]||{};document.getElementById("modal-title").textContent="Unidad "+p.unit;document.getElementById("overlay").classList.add("open");renderModalBody(p,false);renderModalFooter(p,false);}
function closeModal(){document.getElementById("overlay").classList.remove("open");}
function fld(label,key,p,type="text"){const val=(p[key]||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");const disp=(p[key]||"");if(type==="select")return`<div class="field"><label>${label}</label><div class="vv${!disp?" empty":""}">${disp||"—"}</div><select name="${key}"><option value="">—</option><option${disp==="Male"?" selected":""}>Male</option><option${disp==="Female"?" selected":""}>Female</option></select></div>`;if(type==="textarea")return`<div class="field" style="grid-column:1/-1"><label>${label}</label><div class="vv${!disp?" empty":""}">${disp||"—"}</div><textarea name="${key}" rows="3">${disp}</textarea></div>`;return`<div class="field"><label>${label}</label><div class="vv${!disp?" empty":""}">${disp||"—"}</div><input type="${type}" name="${key}" value="${val}"/></div>`;}
function fldFull(label,key,p,type="text"){const val=(p[key]||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");const disp=(p[key]||"");return`<div class="field" style="grid-column:1/-1"><label>${label}</label><div class="vv${!disp?" empty":""}">${disp||"—"}</div><input type="${type}" name="${key}" value="${val}"/></div>`;}
function renderModalBody(p,editing){const ro=currentRole==="viewer";const cls=editing&&!ro?"editing":"";document.getElementById("modal-body").innerHTML=`<div class="${cls}" id="fw"><div class="sec"><div class="sec-title">Propiedad</div><div class="sec-body cols1">${fld("Dirección","address",p)}</div></div><div class="sec"><div class="sec-title">Homeowners</div><div class="sec-body">${fld("Homeowner 1","homeowner1",p)}${fld("Homeowner 2","homeowner2",p)}</div></div><div class="sec"><div class="sec-title">Tenant 1</div><div class="sec-body">${fld("Nombre","tenant1_name",p)}${fld("Teléfono","tenant1_phone",p)}${fldFull("Email","tenant1_email",p,"email")}</div></div><div class="sec"><div class="sec-title">Tenant 2</div><div class="sec-body">${fld("Nombre","tenant2_name",p)}${fld("Teléfono","tenant2_phone",p)}${fldFull("Email","tenant2_email",p,"email")}</div></div><div class="sec"><div class="sec-title">Occupant Adicional 1</div><div class="sec-body">${fld("Nombre","occ1_name",p)}${fld("Teléfono","occ1_phone",p)}${fldFull("Email","occ1_email",p,"email")}</div></div><div class="sec"><div class="sec-title">Occupant Adicional 2</div><div class="sec-body">${fld("Nombre","occ2_name",p)}${fld("Teléfono","occ2_phone",p)}${fldFull("Email","occ2_email",p,"email")}</div></div><div class="sec"><div class="sec-title">Keyfobs</div><div class="sec-body cols4">${[1,2,3,4,5,6,7,8].map(n=>fld("Keyfob "+n,"kf"+n,p)).join("")}</div></div><div class="sec"><div class="sec-title">Mascota 1</div><div class="sec-body">${fld("Nombre","pet1_name",p)}${fld("Raza","pet1_breed",p)}${fld("Género","pet1_gender",p,"select")}</div></div><div class="sec"><div class="sec-title">Mascota 2</div><div class="sec-body">${fld("Nombre","pet2_name",p)}${fld("Raza","pet2_breed",p)}${fld("Género","pet2_gender",p,"select")}</div></div><div class="sec"><div class="sec-title">Notas</div><div class="sec-body cols1">${fld("Notas","notes",p,"textarea")}</div></div></div>`;}
function renderModalFooter(p,editing){const ro=currentRole==="viewer";document.getElementById("modal-footer").innerHTML=ro?`<button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>`:editing?`<button class="btn btn-success" onclick="saveModal('${p.id}')">Guardar</button><button class="btn btn-secondary" onclick="openModal('${p.id}')">Cancelar</button><button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>`:`<button class="btn btn-primary" onclick="editModal('${p.id}')">Editar</button><button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>`;}
function editModal(id){const p=DB[id]||{};renderModalBody(p,true);renderModalFooter(p,true);}
async function saveModal(id){const p=DB[id]||{};const fw=document.getElementById("fw");const updated={...p};fw.querySelectorAll("input,select").forEach(el=>{if(el.name)updated[el.name]=el.value;});fw.querySelectorAll("textarea").forEach(el=>{if(el.name)updated[el.name]=el.value;});document.getElementById("modal-footer").innerHTML="<span style='color:#718096;font-size:13px'>💾 Guardando...</span>";await saveProp(updated);openModal(id);}
function exportCSV(){const cols=["id","unit","address","homeowner1","homeowner2","tenant1_name","tenant1_phone","tenant1_email","tenant2_name","tenant2_phone","tenant2_email","occ1_name","occ1_phone","occ1_email","occ2_name","occ2_phone","occ2_email","kf1","kf2","kf3","kf4","kf5","kf6","kf7","kf8","pet1_name","pet1_breed","pet1_gender","pet2_name","pet2_breed","pet2_gender","notes"];const csv=[cols.join(","),...allProps().map(p=>cols.map(c=>`"${(p[c]||"").toString().replace(/"/g,"''")}"` ).join(","))].join("\n");const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);a.download="dimensions_doral_hoa.csv";a.click();showToast("📥 CSV exportado");}
async function importCSV(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=async ev=>{try{const lines=ev.target.result.split("\n").filter(l=>l.trim());const headers=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());const rows=lines.slice(1).map(line=>{const vals=[];let cur="",inQ=false;for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===","&&!inQ){vals.push(cur);cur="";}else cur+=ch;}vals.push(cur);const obj={};headers.forEach((h,i)=>{obj[h]=(vals[i]||"").replace(/^"|"$/g,"");});return obj;}).filter(r=>r.id||r.unit);const{error}=await sb.from("properties").upsert(rows,{onConflict:"id"});if(!error){await loadData();showToast("✅ Importado: "+rows.length+" registros");}else showToast("❌ Error: "+error.message);}catch(err){showToast("❌ Error: "+err.message);}};reader.readAsText(file,"UTF-8");e.target.value="";}
document.getElementById("preload").style.display="none";
function showToast(msg){const el=document.getElementById("toast");el.textContent=msg;el.style.display="block";el.style.opacity="1";setTimeout(()=>{el.style.opacity="0";setTimeout(()=>el.style.display="none",300);},3000);}
</script>
